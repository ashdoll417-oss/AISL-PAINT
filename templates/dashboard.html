{% extends "base.html" %}

{% block title %}Dashboard - Aviation ERP{% endblock %}

{% block content %}
<div class="welcome-card animate-fade-in">
    <div class="welcome-icon">
        <i class="bi bi-airplane-engines"></i>
    </div>
    <h2>Welcome!</h2>
    <p>Please click on the left panel where you want to start.</p>
</div>

<!-- Quick Stats (Optional - can be shown below welcome message) -->
<div class="stats-grid" style="margin-top: 30px;">
    <div class="stat-card animate-fade-in animate-delay-1">
        <div class="icon blue">
            <i class="bi bi-cart3"></i>
        </div>
        <h3>125</h3>
        <p>Total Sales Today</p>
    </div>
    <div class="stat-card animate-fade-in animate-delay-2">
        <div class="icon green">
            <i class="bi bi-check2-circle"></i>
        </div>
        <h3>89</h3>
        <p>Completed Orders</p>
    </div>
    <div class="stat-card animate-fade-in animate-delay-3">
        <div class="icon orange">
            <i class="bi bi-basket"></i>
        </div>
        <h3>34</h3>
        <p>Pending Purchases</p>
    </div>
    <div class="stat-card animate-fade-in animate-delay-4">
        <div class="icon red">
            <i class="bi bi-box-seam"></i>
        </div>
        <h3>12</h3>
        <p>Low Stock Items</p>
    </div>
{% endblock %}
